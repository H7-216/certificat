<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Éditeur PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!--
    pdf.js v3.11.174 — build UMD navigateur fiable (PC + mobile + file://)
    pdf-lib v1.17.1  — export PDF côté client
  -->
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f8fafc;
      --card:          #ffffff;
      --border:        #e2e8f0;
      --primary:       #3b82f6;
      --primary-dark:  #2563eb;
      --text:          #0f172a;
      --muted:         #64748b;
      --accent-bg:     #eff6ff;
      --accent-border: #bfdbfe;
      --shadow:        0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg:     0 10px 25px rgba(0,0,0,.10), 0 4px 10px rgba(0,0,0,.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────── */
    #header {
      display: none;
      position: sticky; top: 0; z-index: 50;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 0 1rem; height: 56px;
      align-items: center; justify-content: space-between; gap: 1rem;
    }
    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .logo {
      width: 32px; height: 32px; background: var(--primary);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .logo svg { width: 16px; height: 16px; color: #fff; }
    .header-title { font-weight: 700; font-size: 14px; white-space: nowrap; }
    #file-name {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 200px;
    }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .stats-pill {
      display: none; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted);
      background: var(--bg); border-radius: 999px; padding: 4px 12px;
    }
    @media (min-width: 640px) { .stats-pill { display: flex; } }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; padding: 6px 14px;
      border-radius: 8px; border: none; cursor: pointer;
      transition: opacity .15s, background .15s; font-family: inherit;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover:not(:disabled) { background: var(--bg); color: var(--text); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }

    /* ── Drop Zone ──────────────────────────────────── */
    #dropzone-wrapper {
      flex: 1; display: flex;
      align-items: center; justify-content: center; padding: 24px;
    }
    #dropzone {
      width: 100%; max-width: 480px;
      border: 2px dashed var(--border); border-radius: 20px;
      padding: 48px 32px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      cursor: pointer; text-align: center;
      transition: border-color .2s, background .2s, transform .2s;
    }
    #dropzone:hover, #dropzone.drag {
      border-color: var(--primary); background: var(--accent-bg); transform: scale(1.01);
    }
    .drop-icon {
      width: 72px; height: 72px; border-radius: 18px; background: var(--bg);
      display: flex; align-items: center; justify-content: center; transition: background .2s;
    }
    #dropzone:hover .drop-icon, #dropzone.drag .drop-icon { background: rgba(59,130,246,.12); }
    .drop-icon svg { width: 36px; height: 36px; color: var(--muted); transition: color .2s; }
    #dropzone:hover .drop-icon svg, #dropzone.drag .drop-icon svg { color: var(--primary); }
    .drop-title { font-size: 17px; font-weight: 600; }
    .drop-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .drop-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 999px; padding: 4px 14px;
    }

    /* ── Loading ────────────────────────────────────── */
    #loading {
      flex: 1; display: none;
      flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 24px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 14px; font-weight: 500; }
    .loading-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .progress-track {
      width: 192px; height: 6px; background: var(--border);
      border-radius: 999px; overflow: hidden;
    }
    #progress-bar {
      height: 100%; width: 0; background: var(--primary);
      border-radius: 999px; transition: width .25s;
    }
    #progress-pct { font-size: 12px; color: var(--muted); }

    /* ── Pages ──────────────────────────────────────── */
    #pages-container {
      display: none; max-width: 960px; margin: 0 auto;
      width: 100%; padding: 24px 16px 48px;
    }
    @media (min-width: 640px) { #pages-container { padding: 24px 24px 48px; } }

    .info-bar {
      background: var(--accent-bg); border: 1px solid var(--accent-border);
      border-radius: 12px; padding: 12px 16px;
      font-size: 13px; color: #1d4ed8; margin-bottom: 20px; line-height: 1.5;
    }
    .page-wrapper {
      position: relative; background: #fff;
      box-shadow: var(--shadow-lg); margin: 0 auto 24px; overflow: hidden;
    }
    .page-wrapper canvas { display: block; }
    .page-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.4); color: #fff;
      font-size: 11px; padding: 2px 10px;
      border-radius: 999px; pointer-events: none; font-family: 'Inter', sans-serif;
    }

    /* ── Text overlay spans ─────────────────────────── */
    .text-overlay {
      position: absolute; inset: 0; overflow: hidden; z-index: 2;
    }
    .text-overlay span {
      position: absolute;
      color: transparent;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 100%;
      border-radius: 2px;
      transition: background-color .1s;
      user-select: none;
    }
    .text-overlay span:hover {
      background-color: rgba(59,130,246,.2) !important;
    }
    .text-overlay span.modified {
      background-color: rgba(251,191,36,.35) !important;
    }

    /* ── Floating edit input ────────────────────────── */
    #edit-input {
      display: none; position: absolute; z-index: 500;
      background: #fff; border: 2px solid var(--primary);
      border-radius: 5px; outline: none; padding: 1px 6px;
      box-shadow: 0 4px 16px rgba(59,130,246,.28);
      font-family: 'Inter', sans-serif; line-height: 1;
    }

    /* ── Misc ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @media (max-width: 500px) { .hide-sm { display: none; } }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header id="header">
  <div class="header-left">
    <div class="logo">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </div>
    <span class="header-title">Éditeur PDF</span>
    <span id="file-name"></span>
  </div>
  <div class="header-right">
    <div class="stats-pill">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      <span id="stat-pages"></span>
      <span style="color:var(--border)">·</span>
      <span id="stat-items"></span>
      <span id="stat-sep" style="display:none;color:var(--border)">·</span>
      <span id="stat-mods" style="color:#d97706;font-weight:600"></span>
    </div>
    <button class="btn btn-ghost" id="btn-new">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      <span class="hide-sm">Nouveau PDF</span>
    </button>
    <button class="btn btn-primary" id="btn-export" disabled>
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Exporter
      <span id="export-count" style="display:none;background:rgba(255,255,255,.25);border-radius:999px;padding:1px 7px;font-size:11px;"></span>
    </button>
  </div>
</header>

<!-- ── Drop Zone ───────────────────────────────────────────────── -->
<div id="dropzone-wrapper">
  <div id="dropzone">
    <div class="drop-icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
    </div>
    <div>
      <p class="drop-title">Importer un PDF</p>
      <p class="drop-sub">Glissez-déposez votre fichier ici, ou cliquez pour parcourir</p>
    </div>
    <span class="drop-pill">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      Fichiers PDF uniquement
    </span>
  </div>
</div>

<!-- ── Loading ─────────────────────────────────────────────────── -->
<div id="loading">
  <div class="spinner"></div>
  <div style="text-align:center">
    <p class="loading-title">Chargement du PDF…</p>
    <p class="loading-sub">Détection des zones de texte</p>
  </div>
  <div class="progress-track"><div id="progress-bar"></div></div>
  <p id="progress-pct">0 %</p>
</div>

<!-- ── Pages ───────────────────────────────────────────────────── -->
<div id="pages-container"></div>

<!-- ── Floating input ──────────────────────────────────────────── -->
<input id="edit-input" type="text" spellcheck="false" autocomplete="off" />

<script>
(function () {
  'use strict';

  /* ── pdf.js worker ─────────────────────────────────────────── */
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  /* ── State ─────────────────────────────────────────────────── */
  var pages       = [];   // { pageIndex, canvas, width, height, scale, viewport, textItems }
  var mods        = {};   // "pIdx-iIdx" → { pageIndex, itemIndex, originalText, newText, item }
  var modCount    = 0;
  var exportBytes = null;
  var fileName    = '';

  /* ── DOM ───────────────────────────────────────────────────── */
  var dzWrap      = document.getElementById('dropzone-wrapper');
  var dz          = document.getElementById('dropzone');
  var loadingEl   = document.getElementById('loading');
  var pagesEl     = document.getElementById('pages-container');
  var headerEl    = document.getElementById('header');
  var editInput   = document.getElementById('edit-input');
  var btnExport   = document.getElementById('btn-export');
  var btnNew      = document.getElementById('btn-new');
  var progressBar = document.getElementById('progress-bar');
  var progressPct = document.getElementById('progress-pct');
  var fileNameEl  = document.getElementById('file-name');
  var statPages   = document.getElementById('stat-pages');
  var statItems   = document.getElementById('stat-items');
  var statSep     = document.getElementById('stat-sep');
  var statMods    = document.getElementById('stat-mods');
  var exportCount = document.getElementById('export-count');

  /* ── File picking ──────────────────────────────────────────── */
  function pickFile() {
    var inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.pdf,application/pdf';
    inp.onchange = function (e) {
      var f = e.target.files[0];
      if (f) loadPdf(f);
    };
    inp.click();
  }

  dz.addEventListener('click', pickFile);
  btnNew.addEventListener('click', pickFile);

  dz.addEventListener('dragover', function (e) { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', function () { dz.classList.remove('drag'); });
  dz.addEventListener('drop', function (e) {
    e.preventDefault(); dz.classList.remove('drag');
    var f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') loadPdf(f);
  });

  /* ── Load PDF ──────────────────────────────────────────────── */
  function loadPdf(file) {
    fileName  = file.name;
    pages     = [];
    mods      = {};
    modCount  = 0;

    dzWrap.style.display   = 'none';
    loadingEl.style.display = 'flex';
    pagesEl.style.display   = 'none';
    pagesEl.innerHTML       = '';
    headerEl.style.display  = 'none';
    progressBar.style.width = '0';
    progressPct.textContent = '0 %';

    /* FileReader — compatible partout (PC, mobile, file://) */
    var reader = new FileReader();
    reader.onerror = function () {
      showError('Impossible de lire le fichier.');
    };
    reader.onload = function (ev) {
      var buf = ev.target.result;

      /* Deux copies indépendantes : une pour le rendu, une pour l'export */
      exportBytes = new Uint8Array(buf.slice(0));
      var renderBuf = buf.slice(0);

      var task = pdfjsLib.getDocument({ data: new Uint8Array(renderBuf) });

      task.promise.then(function (pdf) {
        var n = pdf.numPages;
        var done = 0;

        function nextPage(i) {
          if (i > n) {
            pages.sort(function (a, b) { return a.pageIndex - b.pageIndex; });
            loadingEl.style.display = 'none';
            pagesEl.style.display   = 'block';
            headerEl.style.display  = 'flex';
            updateHeader();
            renderPages();
            return;
          }

          pdf.getPage(i).then(function (page) {
            var maxW     = Math.min(window.innerWidth - 48, 900);
            var vp1      = page.getViewport({ scale: 1 });
            var scale    = maxW / vp1.width;
            var viewport = page.getViewport({ scale: scale });

            var canvas   = document.createElement('canvas');
            canvas.width  = Math.floor(viewport.width);
            canvas.height = Math.floor(viewport.height);

            page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise
              .then(function () { return page.getTextContent(); })
              .then(function (tc) {
                var items = tc.items.filter(function (it) {
                  return it.str && it.str.trim().length > 0;
                });
                pages.push({
                  pageIndex: i - 1,
                  canvas:    canvas,
                  width:     canvas.width,
                  height:    canvas.height,
                  scale:     scale,
                  viewport:  viewport,
                  textItems: items
                });
                done++;
                var pct = Math.round((done / n) * 100);
                progressBar.style.width = pct + '%';
                progressPct.textContent = pct + ' %';
                nextPage(i + 1);
              });
          });
        }

        nextPage(1);

      }).catch(function (err) {
        showError('PDF invalide : ' + err.message);
      });
    };
    reader.readAsArrayBuffer(file);
  }

  function showError(msg) {
    loadingEl.style.display  = 'none';
    dzWrap.style.display     = 'flex';
    alert(msg);
  }

  /* ── Render pages ──────────────────────────────────────────── */
  function renderPages() {
    pagesEl.innerHTML = '';

    var info = document.createElement('div');
    info.className   = 'info-bar';
    info.innerHTML   = '<b>Cliquez</b> sur n\'importe quel texte pour le modifier. ' +
                       '<b>Entrée</b> pour valider · <b>Échap</b> pour annuler. ' +
                       'Ensuite cliquez sur <b>Exporter</b>.';
    pagesEl.appendChild(info);

    pages.forEach(function (page) {
      var wrap = document.createElement('div');
      wrap.className    = 'page-wrapper';
      wrap.style.width  = page.width  + 'px';
      wrap.style.height = page.height + 'px';

      /* Canvas */
      var cv = document.createElement('canvas');
      cv.width  = page.canvas.width;
      cv.height = page.canvas.height;
      cv.style.width  = page.width  + 'px';
      cv.style.height = page.height + 'px';
      cv.getContext('2d').drawImage(page.canvas, 0, 0);
      wrap.appendChild(cv);

      /* Text overlay */
      var overlay = document.createElement('div');
      overlay.className = 'text-overlay';
      wrap.appendChild(overlay);

      /* Badge */
      var badge = document.createElement('div');
      badge.className   = 'page-badge';
      badge.textContent = 'Page ' + (page.pageIndex + 1);
      wrap.appendChild(badge);

      pagesEl.appendChild(wrap);

      /* Build spans for each text item */
      page.textItems.forEach(function (item, idx) {
        var span = buildSpan(item, idx, page);
        overlay.appendChild(span);
      });
    });
  }

  /* ── Build a positioned span for one text item ─────────────── */
  function buildSpan(item, idx, page) {
    var tx = item.transform;                        // [a, b, c, d, e, f]
    var vt = page.viewport.transform;              // [va, 0, 0, vd, ve, vf]

    /* Convert PDF-space origin (tx[4], tx[5]) to canvas-space */
    var cx = vt[0] * tx[4] + vt[2] * tx[5] + vt[4];
    var cy = vt[1] * tx[4] + vt[3] * tx[5] + vt[5];

    /* Font size in canvas pixels */
    var scaleY   = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
    var fontSize = Math.max(scaleY * page.scale, 6);

    /* Text width */
    var textWidth = item.width > 0
      ? item.width * page.scale
      : fontSize * item.str.length * 0.6;

    /* Rotation (most PDFs have 0) */
    var angle = Math.atan2(tx[1], tx[0]);

    var span = document.createElement('span');
    span.textContent      = item.str;
    span.style.left       = cx + 'px';
    span.style.top        = (cy - fontSize * 1.15) + 'px'; /* cy = baseline; span couvre le texte au-dessus */
    span.style.fontSize   = fontSize + 'px';
    span.style.width      = textWidth + 'px';
    span.style.height     = fontSize * 1.3 + 'px';
    if (angle !== 0) {
      span.style.transform = 'rotate(' + (-angle * 180 / Math.PI) + 'deg)';
    }

    /* Restore previously saved modification */
    var key = page.pageIndex + '-' + idx;
    if (mods[key]) {
      span.textContent = mods[key].newText;
      span.classList.add('modified');
    }

    span.addEventListener('click', (function (s, pg, i, it) {
      return function (e) {
        e.stopPropagation();
        var cur = mods[pg.pageIndex + '-' + i];
        openEdit(s, pg, i, it, cur ? cur.newText : it.str);
      };
    })(span, page, idx, item));

    return span;
  }

  /* ── Inline edit ───────────────────────────────────────────── */
  var _span = null, _page = null, _item = null, _idx = -1;

  function openEdit(span, page, idx, item, currentText) {
    commitEdit(true);

    var r      = span.getBoundingClientRect();
    var tx     = item.transform;
    var scaleY = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
    var fs     = Math.max(scaleY * page.scale, 8);

    _span = span; _page = page; _item = item; _idx = idx;

    editInput.value          = currentText;
    editInput.style.display  = 'block';
    editInput.style.top      = (r.top  + window.scrollY - 3) + 'px';
    editInput.style.left     = (r.left + window.scrollX - 4) + 'px';
    editInput.style.minWidth = Math.max(r.width + 40, 100) + 'px';
    editInput.style.height   = Math.max(r.height + 6, fs + 10) + 'px';
    editInput.style.fontSize = Math.min(fs, 28) + 'px';

    editInput.focus();
    editInput.select();
  }

  var _committing = false;
  function commitEdit(save) {
    if (_committing || editInput.style.display === 'none') return;
    _committing = true;

    if (save && _span) {
      var newText = editInput.value;
      var key     = _page.pageIndex + '-' + _idx;
      if (!mods[key]) modCount++;
      mods[key] = {
        pageIndex: _page.pageIndex, itemIndex: _idx,
        originalText: _item.str, newText: newText, item: _item
      };
      _span.textContent = newText;
      _span.classList.add('modified');
      updateHeader();
    }

    editInput.style.display = 'none';
    _span = null; _page = null; _item = null; _idx = -1;
    _committing = false;
  }

  editInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter')  { e.preventDefault(); commitEdit(true);  }
    if (e.key === 'Escape') { commitEdit(false); }
  });
  editInput.addEventListener('blur',  function () { commitEdit(true);  });
  document.addEventListener('click',  function (e) {
    if (e.target !== editInput) commitEdit(true);
  });

  /* ── Header ────────────────────────────────────────────────── */
  function updateHeader() {
    var total  = pages.reduce(function (a, p) { return a + p.textItems.length; }, 0);
    var hasMod = modCount > 0;

    fileNameEl.textContent    = fileName ? '— ' + fileName : '';
    statPages.textContent     = pages.length + ' page' + (pages.length > 1 ? 's' : '');
    statItems.textContent     = total + ' zones de texte';
    statMods.textContent      = modCount + ' modifié' + (modCount > 1 ? 's' : '');
    statMods.style.display    = hasMod ? 'inline' : 'none';
    statSep.style.display     = hasMod ? 'inline' : 'none';
    btnExport.disabled        = !hasMod;
    exportCount.textContent   = modCount;
    exportCount.style.display = hasMod ? 'inline' : 'none';
  }

  /* ── Export ────────────────────────────────────────────────── */
  btnExport.addEventListener('click', doExport);

  function doExport() {
    if (!exportBytes || modCount === 0) return;

    btnExport.disabled    = true;
    btnExport.textContent = 'Export en cours…';

    var modList = Object.keys(mods).map(function (k) { return mods[k]; })
                        .filter(function (m) { return m.newText !== m.originalText; });

    PDFLib.PDFDocument.load(exportBytes)
      .then(function (doc) {
        return doc.embedFont(PDFLib.StandardFonts.Helvetica)
          .then(function (font) {
            modList.forEach(function (mod) {
              var pdfPage = doc.getPages()[mod.pageIndex];
              var tx      = mod.item.transform;
              var origX   = tx[4], origY = tx[5];
              var scaleY  = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
              var fs      = Math.max(scaleY, 6);
              var origW   = mod.item.width > 0
                ? mod.item.width
                : fs * mod.originalText.length * 0.6;
              var coverW  = Math.max(origW, fs * mod.newText.length * 0.6) + 4;

              pdfPage.drawRectangle({
                x: origX - 1, y: origY - fs * 0.25,
                width: coverW, height: fs * 1.35,
                color: PDFLib.rgb(1, 1, 1), opacity: 1
              });
              pdfPage.drawText(mod.newText, {
                x: origX, y: origY, font: font,
                size: fs, color: PDFLib.rgb(0, 0, 0)
              });
            });
            return doc.save();
          });
      })
      .then(function (out) {
        var blob = new Blob([out], { type: 'application/pdf' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href     = url;
        a.download = fileName.replace(/\.pdf$/i, '') + '_modifié.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      })
      .catch(function (err) {
        alert('Erreur lors de l\'export : ' + err.message);
      })
      .then(function () {
        btnExport.disabled    = !modCount;
        btnExport.innerHTML   =
          '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">' +
          '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
          '<polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>' +
          '</svg> Exporter ' +
          '<span id="export-count" style="display:' + (modCount ? 'inline' : 'none') +
          ';background:rgba(255,255,255,.25);border-radius:999px;padding:1px 7px;font-size:11px;">' +
          modCount + '</span>';
      });
  }

})();
</script>

</html>

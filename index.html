<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Medical Editor - Version Correction Finale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .pdf-container { background: #525659; overflow: auto; }
        .pdf-page { 
            background: white; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); 
            position: relative; 
            margin: 20px auto; 
        }
        
        .date-overlay {
            position: absolute;
            border: 3px solid #3b82f6;
            background: rgba(59, 130, 246, 0.2);
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .date-overlay:hover { transform: scale(1.02); background: rgba(59, 130, 246, 0.3); }
        .date-overlay.selected { 
            background: rgba(245, 158, 11, 0.3); 
            border-color: #f59e0b; 
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.3);
        }
        .date-overlay.modified { background: rgba(34, 197, 94, 0.3); border-color: #22c55e; }
        .date-overlay.modified::after {
            content: 'MODIFIÉ';
            position: absolute;
            top: -20px;
            right: 0;
            background: #22c55e;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .date-protected {
            position: absolute;
            border: 2px dashed #ef4444;
            background: rgba(239, 68, 68, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
        }
        
        .loading { border: 3px solid #f3f4f6; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white border-b h-14 flex items-center justify-between px-4 shadow-sm z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">M</div>
            <h1 class="font-bold text-slate-800">PDF Medical Editor</h1>
        </div>
        <div class="flex gap-2">
            <input type="file" id="pdf-input" accept=".pdf" class="hidden" onchange="loadPDF(event)">
            <label for="pdf-input" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded text-sm cursor-pointer border">Nouveau</label>
            <button onclick="downloadPDF()" id="dl-btn" disabled class="px-3 py-1.5 bg-green-600 text-white rounded text-sm opacity-50 cursor-not-allowed">Télécharger</button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-white border-r flex flex-col">
            <div id="upload-panel" class="flex-1 flex flex-col justify-center items-center p-4 text-center">
                <p class="text-sm text-slate-500 mb-4">Chargez un PDF médical pour détecter et modifier les dates</p>
                <label for="pdf-input" class="bg-blue-600 text-white px-4 py-2 rounded-lg cursor-pointer hover:bg-blue-700">Sélectionner PDF</label>
            </div>
            
            <div id="editor-panel" class="hidden flex-1 flex flex-col">
                <div class="p-3 bg-blue-50 border-b">
                    <div class="flex items-center justify-between">
                        <span id="status" class="text-sm font-medium">Analyse...</span>
                        <span id="count" class="bg-blue-600 text-white text-xs px-2 py-0.5 rounded-full">0</span>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto p-2" id="dates-list"></div>
                
                <div id="edit-box" class="hidden p-3 bg-slate-50 border-t">
                    <div class="text-xs text-slate-500 mb-1">Date originale:</div>
                    <div id="orig-date" class="font-mono font-bold text-sm mb-2 text-slate-800"></div>
                    <input type="date" id="new-date" class="w-full border rounded px-2 py-1 text-sm mb-2">
                    <div class="flex gap-2">
                        <button onclick="apply()" class="flex-1 bg-blue-600 text-white py-1 rounded text-sm">Appliquer</button>
                        <button onclick="today()" class="px-2 bg-slate-200 rounded text-sm">Auj</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 pdf-container relative" id="viewer">
            <div id="empty" class="absolute inset-0 flex items-center justify-center text-slate-400">
                <p>Aucun document</p>
            </div>
            <div id="pages" class="hidden p-8 space-y-8"></div>
        </main>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdfDoc = null;
        let pdfBytes = null;
        let dates = [];
        let selected = null;
        let scale = 1.5;

        const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
        
        const patterns = [
            { re: /\b(\d{1,2})\/(\d{1,2})\/(\d{4})\b/g, type: 'slash' },
            { re: /\b(\d{1,2})-(\d{1,2})-(\d{4})\b/g, type: 'dash' },
            { re: /\b(\d{1,2})\.(\d{1,2})\.(\d{4})\b/g, type: 'dot' },
            { re: /\b(\d{1,2})\s+(janvier|février|fevrier|mars|avril|mai|juin|juillet|août|aout|septembre|octobre|novembre|décembre)\s+(\d{4})\b/gi, type: 'text' }
        ];

        const medical = ['arrêt','travail','jusqu','prescrit','consultation','certificat','médical','pathologique','sorties','doctolib','signé'];
        const protect = ['né','née','naissance','immatriculation','sécurité sociale'];

        async function loadPDF(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                pdfBytes = await file.arrayBuffer();
                pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
                const pdfjs = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
                
                document.getElementById('upload-panel').classList.add('hidden');
                document.getElementById('editor-panel').classList.remove('hidden');
                document.getElementById('empty').classList.add('hidden');
                document.getElementById('pages').classList.remove('hidden');
                
                await render(pdfjs);
                await analyze(pdfjs);
                
            } catch(err) {
                alert('Erreur: ' + err.message);
                console.error(err);
            }
        }

        async function render(pdfjs) {
            const container = document.getElementById('pages');
            container.innerHTML = '';
            
            for (let i = 1; i <= pdfjs.numPages; i++) {
                const page = await pdfjs.getPage(i);
                const vp = page.getViewport({ scale });
                
                const div = document.createElement('div');
                div.className = 'pdf-page';
                div.style.width = vp.width + 'px';
                div.style.height = vp.height + 'px';
                
                const canvas = document.createElement('canvas');
                canvas.width = vp.width;
                canvas.height = vp.height;
                const ctx = canvas.getContext('2d');
                
                await page.render({ canvasContext: ctx, viewport: vp }).promise;
                
                div.appendChild(canvas);
                
                const over = document.createElement('div');
                over.className = 'absolute inset-0';
                over.id = `over-${i}`;
                div.appendChild(over);
                
                container.appendChild(div);
            }
        }

        async function analyze(pdfjs) {
            document.getElementById('status').textContent = 'Analyse...';
            dates = [];
            
            for (let p = 1; p <= pdfjs.numPages; p++) {
                const page = await pdfjs.getPage(p);
                const text = await page.getTextContent();
                
                // Grouper par lignes
                const lines = {};
                text.items.forEach(item => {
                    const y = Math.round(item.transform[5]);
                    if (!lines[y]) lines[y] = [];
                    lines[y].push(item);
                });
                
                // Traiter chaque ligne
                for (const y in lines) {
                    const items = lines[y].sort((a,b) => a.transform[4] - b.transform[4]);
                    const lineText = items.map(i => i.str).join('');
                    
                    // Doctolib spécial
                    const docto = lineText.match(/signé\s+via\s+doctolib.*?(\d{1,2}[\/\s\-]\d{1,2}[\/\s\-]\d{4})/i);
                    if (docto) {
                        const idx = lineText.toLowerCase().indexOf('doctolib');
                        const item = items.find(i => i.str.toLowerCase().includes('doctolib')) || items[0];
                        addDate({
                            id: `d${p}-${dates.length}`,
                            page: p,
                            orig: docto[0],
                            newVal: null,
                            type: 'doctolib',
                            x: item.transform[4],
                            y: parseFloat(y),
                            w: 200,
                            h: 20,
                            isDoctolib: true,
                            isProtected: false
                        }, items);
                        continue;
                    }
                    
                    // Patterns standards
                    for (const pat of patterns) {
                        pat.re.lastIndex = 0;
                        let m;
                        while ((m = pat.re.exec(lineText)) !== null) {
                            const dateStr = m[0];
                            const ctx = lineText.toLowerCase();
                            
                            const isProt = protect.some(k => ctx.includes(k));
                            const isMed = medical.some(k => ctx.includes(k)) || !isProt;
                            
                            // Trouver position
                            let xPos = 0;
                            let targetItem = null;
                            let cumul = '';
                            
                            for (const it of items) {
                                if (cumul.length <= m.index && (cumul + it.str).length >= m.index) {
                                    const offset = m.index - cumul.length;
                                    const cw = it.width / it.str.length;
                                    xPos = it.transform[4] + (offset * cw);
                                    targetItem = it;
                                    break;
                                }
                                cumul += it.str;
                            }
                            
                            if (!targetItem) targetItem = items[0];
                            
                            const cw = targetItem.width / targetItem.str.length;
                            const w = dateStr.length * cw;
                            
                            addDate({
                                id: `d${p}-${dates.length}`,
                                page: p,
                                orig: dateStr,
                                newVal: null,
                                type: pat.type,
                                x: xPos || targetItem.transform[4],
                                y: parseFloat(y),
                                w: Math.max(w + 10, 80),
                                h: Math.max(targetItem.height, 12),
                                isProtected: isProt,
                                isMedical: isMed
                            }, items);
                        }
                    }
                }
            }
            
            showDates();
            updateList();
            document.getElementById('status').textContent = `${dates.length} date(s)`;
        }

        function addDate(date, items) {
            dates.push(date);
        }

        function showDates() {
            document.querySelectorAll('.date-overlay, .date-protected').forEach(e => e.remove());
            
            dates.forEach((d, i) => {
                const over = document.getElementById(`over-${d.page}`);
                if (!over) return;
                
                const page = over.parentElement;
                const ph = page.offsetHeight;
                
                const div = document.createElement('div');
                const x = d.x * scale;
                const y = ph - (d.y * scale) - (d.h * scale);
                
                if (d.isProtected) {
                    div.className = 'date-protected';
                    div.style.left = x + 'px';
                    div.style.top = y + 'px';
                    div.style.width = (d.w * scale) + 'px';
                    div.style.height = (d.h * scale) + 'px';
                    div.innerHTML = '🔒';
                    div.title = 'Protégé';
                } else {
                    div.className = 'date-overlay';
                    div.id = d.id;
                    div.style.left = x + 'px';
                    div.style.top = y + 'px';
                    div.style.width = (d.w * scale) + 'px';
                    div.style.height = (d.h * scale) + 'px';
                    div.onclick = () => select(d.id);
                    
                    const badge = document.createElement('span');
                    badge.className = 'bg-blue-600 text-white text-[10px] px-1 rounded font-bold';
                    badge.textContent = i + 1;
                    div.appendChild(badge);
                    
                    if (d.isDoctolib) {
                        const db = document.createElement('span');
                        db.className = 'absolute -top-4 left-0 bg-green-600 text-white text-[9px] px-1 rounded';
                        db.textContent = 'DOCTOLIB';
                        div.appendChild(db);
                    }
                }
                
                over.appendChild(div);
            });
        }

        function select(id) {
            if (selected) document.getElementById(selected)?.classList.remove('selected');
            selected = id;
            const d = dates.find(x => x.id === id);
            if (!d || d.isProtected) return;
            
            const el = document.getElementById(id);
            el.classList.add('selected');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            document.getElementById('edit-box').classList.remove('hidden');
            document.getElementById('orig-date').textContent = d.orig;
            document.getElementById('new-date').value = new Date().toISOString().split('T')[0];
        }

        function apply() {
            if (!selected) return;
            const d = dates.find(x => x.id === selected);
            if (!d) return;
            
            const [y, m, day] = document.getElementById('new-date').value.split('-');
            let formatted;
            
            switch(d.type) {
                case 'slash': formatted = `${day}/${m}/${y}`; break;
                case 'dash': formatted = `${day}-${m}-${y}`; break;
                case 'dot': formatted = `${day}.${m}.${y}`; break;
                case 'text': formatted = `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`; break;
                case 'doctolib': formatted = `Signé via Doctolib le ${day}/${m}/${y}`; break;
                default: formatted = `${day}/${m}/${y}`;
            }
            
            d.newVal = formatted;
            
            const el = document.getElementById(selected);
            el.classList.remove('selected');
            el.classList.add('modified');
            
            document.getElementById('dl-btn').disabled = false;
            document.getElementById('dl-btn').classList.remove('opacity-50', 'cursor-not-allowed');
            
            updateList();
        }

        function today() {
            document.getElementById('new-date').value = new Date().toISOString().split('T')[0];
        }

        function updateList() {
            const list = document.getElementById('dates-list');
            document.getElementById('count').textContent = dates.length;
            
            list.innerHTML = dates.map((d, i) => {
                const sel = d.id === selected;
                const mod = d.newVal;
                const prot = d.isProtected;
                
                let icon = mod ? '✅' : (prot ? '🔒' : (d.isDoctolib ? '🟢' : '🔵'));
                
                return `<div onclick="${prot ? '' : `select('${d.id}')`}" 
                    class="p-2 mb-2 rounded border text-sm cursor-pointer ${sel ? 'bg-blue-50 border-blue-400' : 'bg-white border-slate-200'} ${prot ? 'opacity-50' : ''}">
                    <div class="flex justify-between">
                        <span class="font-mono font-bold ${mod ? 'text-green-600' : ''}">${icon} ${mod || d.orig}</span>
                        <span class="text-xs bg-slate-100 px-1 rounded">P${d.page}</span>
                    </div>
                    ${d.isDoctolib ? '<div class="text-[10px] text-green-600">DOCTOLIB</div>' : ''}
                </div>`;
            }).join('');
        }

        async function downloadPDF() {
            const btn = document.getElementById('dl-btn');
            btn.textContent = '...';
            btn.disabled = true;
            
            try {
                // NOUVELLE APPROCHE: Modifier le PDF original avec recouvrement précis
                const newPdf = await PDFLib.PDFDocument.load(pdfBytes);
                const pages = newPdf.getPages();
                const font = await newPdf.embedFont(PDFLib.StandardFonts.Helvetica);
                const bold = await newPdf.embedFont(PDFLib.StandardFonts.HelveticaBold);
                
                const modified = dates.filter(d => d.newVal);
                
                for (const d of modified) {
                    const page = pages[d.page - 1];
                    const { width, height } = page.getSize();
                    
                    // Convertir coordonnées PDF (bottom-left) -> PDF-lib (bottom-left)
                    // Mais PDF-js donne Y depuis le bas aussi
                    const pdfY = height - d.y - d.h;
                    
                    // 1. Rectangle blanc LARGEMENT plus grand pour effacer TOUTE trace
                    page.drawRectangle({
                        x: d.x - 5,
                        y: pdfY - 2,
                        width: d.w + 10,
                        height: d.h + 4,
                        color: PDFLib.rgb(1, 1, 1),
                        borderColor: PDFLib.rgb(1, 1, 1),
                        borderWidth: 2,
                    });
                    
                    // 2. Second rectangle blanc pour être sûr
                    page.drawRectangle({
                        x: d.x - 3,
                        y: pdfY - 1,
                        width: d.w + 6,
                        height: d.h + 2,
                        color: PDFLib.rgb(1, 1, 1),
                    });
                    
                    // 3. Texte noir avec taille ajustée
                    const fontSize = d.h * 0.85;
                    const useFont = d.isDoctolib ? bold : font;
                    
                    // Ajuster Y pour centrer verticalement
                    const textY = pdfY + (d.h - fontSize) / 2;
                    
                    page.drawText(d.newVal, {
                        x: d.x,
                        y: textY,
                        size: fontSize,
                        font: useFont,
                        color: PDFLib.rgb(0, 0, 0),
                    });
                }
                
                const bytes = await newPdf.save();
                const blob = new Blob([bytes], { type: 'application/pdf' });
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `document-modifie-${new Date().toISOString().split('T')[0]}.pdf`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                
            } catch(e) {
                console.error(e);
                alert('Erreur: ' + e.message);
            } finally {
                btn.textContent = 'Télécharger';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

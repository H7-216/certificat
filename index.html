<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur PDF Direct - Modification In-Place</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: linear-gradient(90deg, #16213e 0%, #0f3460 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #c13651;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: #533483;
            color: white;
        }

        .btn-secondary:hover {
            background: #7b2cbf;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .toolbar {
            width: 60px;
            background: #16213e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 15px;
            border-right: 1px solid #0f3460;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
            position: relative;
        }

        .tool-btn:hover, .tool-btn.active {
            background: #e94560;
        }

        .tool-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50px;
            background: #000;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .tool-btn:hover::after {
            opacity: 1;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2d2d44;
            overflow: hidden;
        }

        .pdf-container {
            flex: 1;
            overflow: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: 
                radial-gradient(circle at 20% 50%, #2d2d44 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, #1a1a2e 0%, transparent 50%),
                #1a1a2e;
        }

        .pdf-page {
            background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            margin: 0 auto;
            transform-origin: top center;
            transition: transform 0.3s;
        }

        .pdf-canvas {
            display: block;
        }

        .text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Style pour les champs éditables - exactement comme le texte original */
        .pdf-text {
            position: absolute;
            color: transparent;
            cursor: text;
            pointer-events: auto;
            caret-color: #e94560;
            outline: none;
            white-space: pre;
            transform-origin: bottom left;
        }

        .pdf-text:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .pdf-text:focus {
            background: rgba(233, 69, 96, 0.2);
            box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.5);
        }

        .pdf-text.modified {
            color: #000 !important;
            background: rgba(255, 193, 7, 0.3) !important;
        }

        .selection-box {
            position: absolute;
            border: 2px dashed #e94560;
            background: rgba(233, 69, 96, 0.1);
            pointer-events: none;
            display: none;
        }

        .bottom-bar {
            height: 50px;
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-top: 1px solid #0f3460;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .zoom-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 4px;
            background: #0f3460;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .info-panel {
            position: fixed;
            right: -350px;
            top: 70px;
            width: 350px;
            height: calc(100vh - 70px);
            background: #16213e;
            border-left: 1px solid #0f3460;
            transition: right 0.3s;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
        }

        .info-panel.open {
            right: 0;
        }

        .info-panel h3 {
            margin-bottom: 20px;
            color: #e94560;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modification-item {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #e94560;
        }

        .modification-item .original {
            font-size: 12px;
            color: #888;
            text-decoration: line-through;
            margin-bottom: 5px;
        }

        .modification-item .new {
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }

        .upload-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .upload-box {
            background: #16213e;
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            border: 2px dashed #533483;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-box:hover {
            border-color: #e94560;
            transform: scale(1.05);
        }

        .upload-box.dragover {
            background: #0f3460;
            border-color: #e94560;
        }

        .hidden {
            display: none !important;
        }

        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 25px;
            background: #16213e;
            border-left: 4px solid #e94560;
            border-radius: 8px;
            color: white;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .notification.show {
            transform: translateX(0);
        }

        .toggle-panel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 80px;
            background: #e94560;
            border-radius: 20px 0 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 99;
            transition: right 0.3s;
        }

        .toggle-panel.open {
            right: 350px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #888;
        }

        .stats span {
            color: #e94560;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="upload-overlay" id="uploadOverlay">
        <div class="upload-box" id="uploadBox">
            <div style="font-size: 4rem; margin-bottom: 20px;">📄</div>
            <h2>Déposez votre PDF ici</h2>
            <p style="color: #888; margin-top: 10px;">ou cliquez pour sélectionner</p>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        </div>
    </div>

    <header class="header">
        <h1>
            <span>✏️</span>
            PDF Editor Direct
        </h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">
                📂 Ouvrir
            </button>
            <button class="btn btn-primary" onclick="exportPDF()">
                💾 Exporter PDF
            </button>
        </div>
    </header>

    <div class="main-container">
        <div class="toolbar">
            <button class="tool-btn active" data-tooltip="Sélectionner" onclick="setTool('select')">👆</button>
            <button class="tool-btn" data-tooltip="Ajouter texte" onclick="setTool('add')">📝</button>
            <button class="tool-btn" data-tooltip="Dessiner" onclick="setTool('draw')">✏️</button>
            <button class="tool-btn" data-tooltip="Gomme" onclick="setTool('erase')">🧹</button>
            <button class="tool-btn" data-tooltip="Réinitialiser" onclick="resetModifications()">🔄</button>
        </div>

        <div class="workspace">
            <div class="pdf-container" id="pdfContainer">
                <div style="color: #666; text-align: center;">
                    <p>Importez un PDF pour commencer</p>
                </div>
            </div>
            
            <div class="bottom-bar">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoom(-0.1)">−</button>
                    <span id="zoomLevel">100%</span>
                    <button class="zoom-btn" onclick="zoom(0.1)">+</button>
                </div>
                <div class="stats">
                    <div>Modifications: <span id="modCount">0</span></div>
                    <div>Page: <span id="pageInfo">0/0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toggle-panel" id="togglePanel" onclick="toggleInfoPanel()">
        <span>◀</span>
    </div>

    <div class="info-panel" id="infoPanel">
        <h3>📋 Modifications</h3>
        <div id="modificationsList">
            <p style="color: #666; text-align: center; margin-top: 50px;">
                Aucune modification
            </p>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let currentPDF = null;
        let pdfDocument = null;
        let currentScale = 1.5;
        let modifications = new Map();
        let currentTool = 'select';

        // Upload handlers
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');

        uploadBox.addEventListener('click', () => fileInput.click());
        
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                loadPDF(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) loadPDF(e.target.files[0]);
        });

        async function loadPDF(file) {
            showNotification('Chargement du PDF...', 'info');
            const arrayBuffer = await file.arrayBuffer();
            currentPDF = arrayBuffer;
            
            try {
                pdfDocument = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                document.getElementById('uploadOverlay').classList.add('hidden');
                await renderAllPages();
                showNotification('PDF chargé ! Cliquez sur le texte pour modifier', 'success');
            } catch (error) {
                showNotification('Erreur de chargement', 'error');
                console.error(error);
            }
        }

        async function renderAllPages() {
            const container = document.getElementById('pdfContainer');
            container.innerHTML = '';
            modifications.clear();
            updateModificationsList();

            for (let i = 1; i <= pdfDocument.numPages; i++) {
                const page = await pdfDocument.getPage(i);
                const viewport = page.getViewport({ scale: currentScale });
                
                const pageDiv = document.createElement('div');
                pageDiv.className = 'pdf-page';
                pageDiv.style.width = viewport.width + 'px';
                pageDiv.style.height = viewport.height + 'px';
                pageDiv.dataset.pageNum = i;
                
                // Canvas pour le rendu PDF
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-canvas';
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                
                // Couche de texte éditable
                const textLayer = document.createElement('div');
                textLayer.className = 'text-layer';
                
                const textContent = await page.getTextContent();
                
                textContent.items.forEach((item, idx) => {
                    const textDiv = createEditableText(item, viewport, i, idx);
                    textLayer.appendChild(textDiv);
                });
                
                pageDiv.appendChild(canvas);
                pageDiv.appendChild(textLayer);
                container.appendChild(pageDiv);
            }
            
            document.getElementById('pageInfo').textContent = `1/${pdfDocument.numPages}`;
        }

        function createEditableText(item, viewport, pageNum, idx) {
            const div = document.createElement('div');
            div.className = 'pdf-text';
            div.textContent = item.str;
            div.dataset.original = item.str;
            div.dataset.page = pageNum;
            div.dataset.index = idx;
            
            // Calcul précis de la position et taille
            const tx = item.transform;
            const fontSize = Math.sqrt(tx[0] * tx[0] + tx[1] * tx[1]);
            
            // Positionnement exact
            div.style.left = tx[4] + 'px';
            div.style.top = (viewport.height - tx[5] - fontSize) + 'px';
            div.style.fontSize = fontSize + 'px';
            div.style.fontFamily = item.fontName || 'Arial';
            div.style.transform = `scaleX(${tx[0] / fontSize})`;
            
            // Largeur approximative basée sur le texte
            div.style.minWidth = (item.width || fontSize * item.str.length * 0.6) + 'px';
            div.style.height = fontSize + 'px';
            
            // Gestion de l'édition
            div.addEventListener('focus', function() {
                this.style.color = '#000';
                selectText(this);
            });
            
            div.addEventListener('blur', function() {
                if (this.textContent !== this.dataset.original) {
                    this.classList.add('modified');
                    saveModification(this);
                } else {
                    this.classList.remove('modified');
                    this.style.color = 'transparent';
                }
            });
            
            div.addEventListener('input', function() {
                this.classList.add('modified');
                this.style.color = '#000';
            });
            
            // Double-clic pour sélectionner tout
            div.addEventListener('dblclick', function(e) {
                e.stopPropagation();
                const range = document.createRange();
                range.selectNodeContents(this);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            });
            
            return div;
        }

        function selectText(element) {
            // Désélectionner les autres
            document.querySelectorAll('.pdf-text').forEach(el => {
                if (el !== element) el.style.color = 'transparent';
            });
        }

        function saveModification(element) {
            const key = `${element.dataset.page}-${element.dataset.index}`;
            const mod = {
                page: element.dataset.page,
                index: element.dataset.index,
                original: element.dataset.original,
                new: element.textContent,
                element: element
            };
            
            if (element.textContent === element.dataset.original) {
                modifications.delete(key);
            } else {
                modifications.set(key, mod);
            }
            
            updateModificationsList();
            document.getElementById('modCount').textContent = modifications.size;
        }

        function updateModificationsList() {
            const list = document.getElementById('modificationsList');
            
            if (modifications.size === 0) {
                list.innerHTML = '<p style="color: #666; text-align: center; margin-top: 50px;">Aucune modification</p>';
                return;
            }
            
            list.innerHTML = '';
            modifications.forEach((mod, key) => {
                const item = document.createElement('div');
                item.className = 'modification-item';
                item.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <small style="color: #888;">Page ${mod.page}</small>
                        <button onclick="restoreOriginal('${key}')" style="background: none; border: none; color: #e94560; cursor: pointer; font-size: 12px;">↩️</button>
                    </div>
                    <div class="original">${mod.original}</div>
                    <div class="new">${mod.new}</div>
                `;
                item.onclick = () => {
                    mod.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    mod.element.focus();
                };
                list.appendChild(item);
            });
        }

        function restoreOriginal(key) {
            const mod = modifications.get(key);
            if (mod) {
                mod.element.textContent = mod.original;
                mod.element.classList.remove('modified');
                mod.element.style.color = 'transparent';
                mod.element.blur();
                modifications.delete(key);
                updateModificationsList();
                document.getElementById('modCount').textContent = modifications.size;
            }
        }

        function resetModifications() {
            if (modifications.size === 0) return;
            if (!confirm('Réinitialiser toutes les modifications ?')) return;
            
            modifications.forEach((mod) => {
                mod.element.textContent = mod.original;
                mod.element.classList.remove('modified');
                mod.element.style.color = 'transparent';
            });
            modifications.clear();
            updateModificationsList();
            document.getElementById('modCount').textContent = 0;
            showNotification('Modifications réinitialisées', 'success');
        }

        async function exportPDF() {
            if (!currentPDF) {
                showNotification('Aucun PDF à exporter', 'error');
                return;
            }

            showNotification('Génération du PDF...', 'info');
            
            try {
                const pages = document.querySelectorAll('.pdf-page');
                const { PDFDocument } = PDFLib;
                const newPdf = await PDFDocument.create();
                
                for (let pageDiv of pages) {
                    // Capture haute qualité
                    const canvas = await html2canvas(pageDiv, {
                        scale: 2,
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: '#ffffff',
                        logging: false
                    });
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const imgBytes = await fetch(imgData).then(r => r.arrayBuffer());
                    const img = await newPdf.embedJpg(imgBytes);
                    
                    const page = newPdf.addPage([img.width, img.height]);
                    page.drawImage(img, {
                        x: 0,
                        y: 0,
                        width: img.width,
                        height: img.height
                    });
                }
                
                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'document_modifie.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showNotification('PDF exporté avec succès !', 'success');
            } catch (error) {
                console.error(error);
                showNotification('Erreur lors de l\'export', 'error');
            }
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(tool)) {
                    btn.classList.add('active');
                }
            });
        }

        function zoom(delta) {
            currentScale = Math.max(0.5, Math.min(3, currentScale + delta));
            document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%';
            if (pdfDocument) renderAllPages();
        }

        function toggleInfoPanel() {
            const panel = document.getElementById('infoPanel');
            const toggle = document.getElementById('togglePanel');
            panel.classList.toggle('open');
            toggle.classList.toggle('open');
            toggle.innerHTML = panel.classList.contains('open') ? '▶' : '◀';
        }

        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.borderLeftColor = type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#17a2b8';
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // Raccourcis clavier
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    exportPDF();
                } else if (e.key === 'o') {
                    e.preventDefault();
                    document.getElementById('fileInput').click();
                }
            }
        });
    </script>
</body>
</html>
